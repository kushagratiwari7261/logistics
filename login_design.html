        }

            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }
        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }
        .delay-5 { animation-delay: 0.5s; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        /* Role Selector Active State */
        input[type="radio"]:checked + label {
            background-color: #316bf3;
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(49, 107, 243, 0.25);
        }

<h1 class="font-display-sm text-display-sm text-on-primary mb-2 tracking-tight fade-up delay-1">Elevation</h1>
<p class="font-body-md text-body-md text-on-primary/80 max-w-sm fade-up delay-2">Institutional Intelligence &amp; Performance Management</p>
</div>
<!-- Bottom decorative element (Mobile only) -->
<div class="absolute bottom-0 left-0 right-0 h-16 bg-gradient-to-t from-background to-transparent md:hidden"></div>
</section>
<!-- Bottom Section / Right Section (Form) -->
<section class="flex-1 bg-background md:bg-white flex items-center justify-center p-6 md:p-12 lg:p-24 relative">
<!-- Shared Component Logic: This page represents a Task-Focused journey, so the Shell (NavBars) is suppressed. -->
<div class="w-full max-w-md space-y-8 glass-panel md:bg-transparent p-8 md:p-0 rounded-xl md:rounded-none shadow-xl md:shadow-none -mt-12 md:mt-0 relative z-20 fade-up delay-3">
<!-- Header -->
<header class="space-y-2">
<h2 class="font-headline-lg text-headline-lg text-primary">Welcome Back</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Please sign in to your portal</p>
</header>
<!-- Login Form -->
<form class="space-y-6" id="loginForm" onsubmit="event.preventDefault();">
<!-- Role Selector -->
<div class="space-y-3 fade-up delay-4">
<label class="font-label-md text-label-md text-on-surface-variant block uppercase tracking-wider">Select Role</label>
<div class="grid grid-cols-3 gap-2 p-1 bg-surface-container-low rounded-lg border border-outline-variant">
<div class="relative">
<input checked="" class="sr-only peer" id="role-staff" name="role" type="radio" value="staff"/>
<label class="flex items-center justify-center py-2 px-3 rounded-md font-label-md text-label-md text-on-surface-variant cursor-pointer transition-all duration-200 hover:bg-white/50 peer-checked:bg-secondary-container peer-checked:text-on-secondary-container" for="role-staff">
                                    Staff
                                </label>
</div>
<div class="relative">
<input class="sr-only peer" id="role-student" name="role" type="radio" value="student"/>
<label class="flex items-center justify-center py-2 px-3 rounded-md font-label-md text-label-md text-on-surface-variant cursor-pointer transition-all duration-200 hover:bg-white/50 peer-checked:bg-secondary-container peer-checked:text-on-secondary-container" for="role-student">
                                    Student
                                </label>
</div>
<div class="relative">
<input class="sr-only peer" id="role-admin" name="role" type="radio" value="admin"/>
<label class="flex items-center justify-center py-2 px-3 rounded-md font-label-md text-label-md text-on-surface-variant cursor-pointer transition-all duration-200 hover:bg-white/50 peer-checked:bg-secondary-container peer-checked:text-on-secondary-container" for="role-admin">
                                    Admin
                                </label>
</div>
</div>
</div>
<!-- Email Field -->
<div class="space-y-2 fade-up delay-5">
<label class="font-label-md text-label-md text-on-surface-variant block uppercase tracking-wider" for="email">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline group-focus-within:text-secondary transition-colors">
<span class="material-symbols-outlined">alternate_email</span>
</div>
<input class="block w-full pl-12 pr-4 py-3 bg-white border border-outline-variant rounded-lg font-body-md text-body-md focus:ring-2 focus:ring-secondary/20 focus:border-secondary outline-none transition-all placeholder:text-outline/50" id="email" placeholder="name@elevation.edu" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2 fade-up delay-5">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider" for="password">Password</label>
<a class="font-label-md text-label-md text-secondary hover:text-on-secondary-fixed-variant transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative group" x-data="{ show: false }">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline group-focus-within:text-secondary transition-colors">
<span class="material-symbols-outlined">lock</span>
</div>
<input class="block w-full pl-12 pr-12 py-3 bg-white border border-outline-variant rounded-lg font-body-md text-body-md focus:ring-2 focus:ring-secondary/20 focus:border-secondary outline-none transition-all placeholder:text-outline/50" id="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-outline hover:text-on-surface transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" id="passToggleIcon">visibility</span>
</button>
</div>
</div>
<!-- Sign In Button -->
<button class="w-full bg-secondary-container text-on-secondary-container font-headline-md text-headline-md py-4 rounded-lg shadow-sm hover:shadow-md hover:bg-secondary transition-all active:scale-[0.98] duration-150 flex items-center justify-center gap-2 group fade-up delay-5" type="submit">
                        Sign In
                        <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Footer -->
<footer class="pt-8 border-t border-outline-variant text-center fade-up delay-5">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                        New here? <a class="text-secondary font-bold hover:underline" href="#">Contact school administration</a>
</p>
</footer>
</div>
<!-- Subtle background branding or grid for depth -->
<div class="absolute top-0 right-0 p-8 opacity-10 pointer-events-none hidden md:block">
<span class="font-headline-lg text-headline-lg font-bold">EST. 2024</span>
</div>
</section>
</main>
<script>
        function togglePassword() {
            const passInput = document.getElementById('password');
            const toggleIcon = document.getElementById('passToggleIcon');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                toggleIcon.textContent = 'visibility_off';
            } else {
                passInput.type = 'password';
                toggleIcon.textContent = 'visibility';
            }
        }

        // Entrance animation logic
        document.addEventListener('DOMContentLoaded', () => {
            const elements = document.querySelectorAll('.fade-up');
            elements.forEach((el, index) => {
                // Ensure visibility after interaction
                el.style.opacity = '1';
            });
        });
    </script>
</body></html>

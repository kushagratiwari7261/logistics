<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/seal.png" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="Seal Freight — Modern logistics and freight forwarding management platform." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="Seal Freight" />
  <link rel="apple-touch-icon" href="/seal.png" />
  
  <title>Seal Freight | Logistics Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <!-- Restore saved theme before first paint -->
  <script>
    (function () {
      var html = document.documentElement;
      var mode = localStorage.getItem('sf_color_mode') || 'dark';
      if (mode === 'system') {
        mode = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      html.setAttribute('data-theme', mode);

      // Only restore sidebar accent if user has explicitly saved one
      var accent = localStorage.getItem('sf_accent_color');
      if (accent) {
        var accents = {
          indigo: { '--brand-primary': '#6366f1', '--brand-gradient': 'linear-gradient(135deg,#4f46e5,#6366f1,#818cf8)', '--brand-glow': 'rgba(99,102,241,0.35)' },
          emerald: { '--brand-primary': '#10b981', '--brand-gradient': 'linear-gradient(135deg,#059669,#10b981,#34d399)', '--brand-glow': 'rgba(16,185,129,0.3)' },
          rose: { '--brand-primary': '#f43f5e', '--brand-gradient': 'linear-gradient(135deg,#e11d48,#f43f5e,#fb7185)', '--brand-glow': 'rgba(244,63,94,0.3)' },
          amber: { '--brand-primary': '#f59e0b', '--brand-gradient': 'linear-gradient(135deg,#d97706,#f59e0b,#fbbf24)', '--brand-glow': 'rgba(245,158,11,0.3)' },
          violet: { '--brand-primary': '#8b5cf6', '--brand-gradient': 'linear-gradient(135deg,#7c3aed,#8b5cf6,#a78bfa)', '--brand-glow': 'rgba(139,92,246,0.3)' },
          sky: { '--brand-primary': '#0ea5e9', '--brand-gradient': 'linear-gradient(135deg,#0284c7,#0ea5e9,#38bdf8)', '--brand-glow': 'rgba(14,165,233,0.3)' },
        };
        var t = accents[accent];
        if (t) Object.keys(t).forEach(function (k) { html.style.setProperty(k, t[k]); });
      }
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  
  <div id="pwa-install-banner" style="display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 99999; background: var(--brand-primary, #6366f1); color: white; padding: 12px 20px; border-radius: 8px; font-family: 'Inter', sans-serif; font-weight: 600; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); align-items: center; gap: 15px;">
    <span>Install App for better experience</span>
    <button id="pwa-install-btn" style="background: white; color: var(--brand-primary, #6366f1); border: none; padding: 8px 16px; border-radius: 4px; font-weight: 700; cursor: pointer; transition: background 0.2s;">Install</button>
  </div>

  <script type="module" src="./src/main.jsx"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW registration failed:', err));
      });
    }

    let deferredPrompt;
    const installBanner = document.getElementById('pwa-install-banner');
    const installBtn = document.getElementById('pwa-install-btn');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBanner.style.display = 'flex';
    });

    installBtn.addEventListener('click', async () => {
      installBanner.style.display = 'none';
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      console.log(`User response to the install prompt: ${outcome}`);
      deferredPrompt = null;
    });

    window.addEventListener('appinstalled', () => {
      deferredPrompt = null;
      installBanner.style.display = 'none';
      console.log('PWA was installed');
    });
  </script>
</body>

</html>
